name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"] # Ou "master", dependendo da sua branch principal

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies 📦
        run: npm install

      - name: Build 🏗️
        # É AQUI que a mágica acontece! Injetamos a Secret no build
        run: npm run build
        env:
          API_URL: ${{ secrets.API_URL }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # O Vite gera os arquivos na pasta dist
          branch: gh-pages # A branch que o GitHub Pages vai usar